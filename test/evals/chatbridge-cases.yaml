name: "ChatBridge 7 Grading Scenarios"
test_cases:
  # Scenario 1: Tool Discovery — user asks to use a third-party app
  - id: eval-001-tool-discovery
    query: "Let's play chess"
    checks:
      expectedTools: [launch_app]
      mustContain: ["chess"]
      mustNotContain: ["I can't", "I don't have"]
      thresholdMs: 30000

  # Scenario 2: App Rendering — after chess registers tools, AI starts the game
  - id: eval-002-app-start
    query: "Start a new game, I'll play as white"
    checks:
      expectedTools: [app__chess__start_game]
      mustNotContain: ["error", "not available"]
      thresholdMs: 30000

  # Scenario 5: Multi-App Switching — switch from chess to whiteboard
  - id: eval-005-multi-app-switch
    query: "Actually, let me open the whiteboard instead"
    checks:
      expectedTools: [launch_app]
      mustContain: ["whiteboard"]
      mustNotContain: ["chess move", "make_move"]
      thresholdMs: 30000

  # Scenario 6: Ambiguous Routing — maps to correct app
  - id: eval-006-ambiguous-routing
    query: "I want to play a game"
    checks:
      expectedTools: [launch_app]
      mustNotContain: ["whiteboard", "classroom"]
      thresholdMs: 30000

  # Scenario 7: Refusal — chatbot refuses app tools for unrelated queries
  - id: eval-007-refusal
    query: "What's the weather like today in New York?"
    checks:
      toolCallMax: 0
      mustNotContain: ["launch_app", "chess", "whiteboard"]
      thresholdMs: 30000
      lengthMin: 10
